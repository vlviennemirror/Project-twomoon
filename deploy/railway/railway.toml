[build]
builder = "nixpacks"
buildCommand = "pip install --no-cache-dir -r requirements.txt && cd web_hub/frontend && npm ci && npm run build"

[deploy]
startCommand = "uvicorn web_hub.main:app --host 0.0.0.0 --port ${PORT}"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[build.nixPacks]
pythonVersion = "3.11"
nodeVersion = "20"
